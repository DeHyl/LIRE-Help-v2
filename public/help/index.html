<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>LIRE Help · Operations OS</title>
<link rel="stylesheet" href="design/colors_and_type.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::selection { background: var(--accent); color: #fff; }

  /* scrollbars: tight */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); background-clip: content-box; border: 2px solid transparent; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Compact density adjustments applied on root */
  .density-comfortable { --density-row: 12px; }
  .density-compact { --density-row: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// Tweakable defaults (editable via Tweaks panel)
const LIRE_TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "aiPanel": true,
  "accent": "#FF4D00",
  "conciergeHero": "A",
  "entry": "landing",
  "landingHero": "A"
}/*EDITMODE-END*/;
window.LIRE_TWEAKS_INITIAL = LIRE_TWEAKS;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="design/data.js"></script>
<script type="text/babel" src="design/Primitives.jsx"></script>
<script type="text/babel" src="design/Shell.jsx"></script>
<script type="text/babel" src="design/InboxScreen.jsx"></script>
<script type="text/babel" src="design/OtherScreens.jsx"></script>
<script type="text/babel" src="design/ConciergeScreen.jsx"></script>
<script type="text/babel" src="design/ConciergeTabs.jsx"></script>
<script type="text/babel" src="design/LandingLogin.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

function TweaksPanel({ open, tweaks, onChange, onClose }) {
  if (!open) return null;
  const setT = (k, v) => onChange({ ...tweaks, [k]: v });
  return (
    <div style={{
      position: "fixed", right: 16, bottom: 16, width: 280, zIndex: 90,
      background: "var(--surface)", border: "1px solid var(--border)",
      borderRadius: 4, boxShadow: "var(--shadow-menu)",
    }}>
      <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center" }}>
        <div style={{ flex: 1 }}>
          <Eyebrow>Tweaks</Eyebrow>
          <div style={{ fontFamily: "var(--font-display)", fontSize: 14, fontWeight: 600, color: "var(--fg)", marginTop: 2 }}>
            Prototype settings
          </div>
        </div>
        <Btn size="icon" variant="ghost" onClick={onClose} icon={<Icon.X size={14}/>}/>
      </div>
      <div style={{ padding: 14, display: "grid", gap: 14 }}>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>Theme</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
            {["light","dark"].map(v => (
              <Btn key={v} size="sm" variant={tweaks.theme === v ? "dark" : "secondary"} onClick={() => setT("theme", v)}>
                {v[0].toUpperCase()+v.slice(1)}
              </Btn>
            ))}
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>Density</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
            {[
              { k: "comfortable", l: "Comfortable" },
              { k: "compact",     l: "Compact" },
            ].map(v => (
              <Btn key={v.k} size="sm" variant={tweaks.density === v.k ? "dark" : "secondary"} onClick={() => setT("density", v.k)}>
                {v.l}
              </Btn>
            ))}
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>AI Concierge panel</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
            <Btn size="sm" variant={tweaks.aiPanel ? "dark" : "secondary"} onClick={() => setT("aiPanel", true)}>Visible</Btn>
            <Btn size="sm" variant={!tweaks.aiPanel ? "dark" : "secondary"} onClick={() => setT("aiPanel", false)}>Hidden</Btn>
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>View</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4 }}>
            {[
              { k: "landing", l: "Landing" },
              { k: "login",   l: "Login" },
              { k: "app",     l: "App" },
            ].map(v => (
              <Btn key={v.k} size="sm" variant={tweaks.entry === v.k ? "dark" : "secondary"} onClick={() => setT("entry", v.k)}>{v.l}</Btn>
            ))}
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>Landing hero</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
            {[
              { k: "A", l: "Editorial" },
              { k: "B", l: "Narrative" },
            ].map(v => (
              <Btn key={v.k} size="sm" variant={tweaks.landingHero === v.k ? "dark" : "secondary"} onClick={() => setT("landingHero", v.k)}>{v.l}</Btn>
            ))}
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>Concierge hero</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
            {[
              { k: "A", l: "Control room" },
              { k: "B", l: "Meet agent" },
            ].map(v => (
              <Btn key={v.k} size="sm" variant={tweaks.conciergeHero === v.k ? "dark" : "secondary"} onClick={() => setT("conciergeHero", v.k)}>{v.l}</Btn>
            ))}
          </div>
        </div>
        <div>
          <Eyebrow style={{ fontSize: 10, marginBottom: 6 }}>Accent</Eyebrow>
          <div style={{ display: "flex", gap: 6 }}>
            {["#FF4D00","#111111","#0B6B4A","#3D5BFF"].map(c => (
              <button key={c} onClick={() => setT("accent", c)}
                style={{
                  width: 26, height: 26, borderRadius: 3, border: tweaks.accent === c ? "2px solid var(--fg)" : "1px solid var(--border)",
                  background: c, cursor: "pointer", padding: 0,
                }} title={c}/>
            ))}
          </div>
        </div>
        <div style={{ fontFamily: "var(--font-body)", fontSize: 11, color: "var(--fg-muted)", lineHeight: 1.5 }}>
          Tip: <Kbd>⌘K</Kbd> for command palette · <Kbd>J</Kbd>/<Kbd>K</Kbd> to navigate the queue.
        </div>
      </div>
    </div>
  );
}

function App() {
  const initial = window.LIRE_TWEAKS_INITIAL || { theme: "light", density: "comfortable", aiPanel: true, accent: "#FF4D00", conciergeHero: "A", entry: "landing", landingHero: "A" };
  const [tweaks, setTweaks] = useState(initial);
  const [view, setView] = useState(() => localStorage.getItem("lire.view_route") || initial.entry || "landing");
  useEffect(() => { localStorage.setItem("lire.view_route", view); }, [view]);

  // Signed-in user. Populated by LoginScreen via onApp(email).
  // For landing "Walk the demo" (no email), we use a generic placeholder — nothing about roles yet.
  const makeUser = (email) => {
    const e = (email || "").trim().toLowerCase();
    if (!e) return { email: "", name: "Guest", initials: "•", authed: false };
    const local = e.split("@")[0] || "you";
    const parts = local.split(/[._\-+]/).filter(Boolean);
    const name = parts.length
      ? parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(" ")
      : local.charAt(0).toUpperCase() + local.slice(1);
    const initials = parts.length >= 2
      ? (parts[0][0] + parts[1][0]).toUpperCase()
      : (local[0] + (local[1] || local[0])).toUpperCase();
    return { email: e, name, initials, authed: true };
  };
  const [user, setUser] = useState(() => {
    const saved = localStorage.getItem("lire.user_email");
    if (saved) return makeUser(saved);
    // No stored auth — if demo entry goes straight to app, show a demo account rather than "Guest".
    return (initial.entry === "app") ? makeUser("demo@lire.app") : makeUser("");
  });
  const signIn = useCallback((email) => {
    const u = makeUser(email);
    setUser(u);
    if (u.authed) localStorage.setItem("lire.user_email", u.email);
    setView("app");
  }, []);
  // When the user toggles 'entry' in Tweaks, jump to that view immediately (but skip the initial mount)
  const didMount = React.useRef(false);
  useEffect(() => {
    if (!didMount.current) { didMount.current = true; return; }
    if (tweaks.entry) setView(tweaks.entry);
  }, [tweaks.entry]);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaksAvailable, setTweaksAvailable] = useState(false);

  const [nav, setNav] = useState(() => localStorage.getItem("lire.nav") || "inbox");
  const [viewKey, setViewKey] = useState(() => localStorage.getItem("lire.view") || "priority");
  const [selectedId, setSelectedId] = useState(() => localStorage.getItem("lire.selected") || "LIRE-4184");
  const [cmdOpen, setCmdOpen] = useState(false);
  const [newTicketOpen, setNewTicketOpen] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => localStorage.getItem("lire.sidebarCollapsed") === "1");
  const [viewsCollapsed, setViewsCollapsed] = useState(() => localStorage.getItem("lire.viewsCollapsed") === "1");
  const [focusMode, setFocusMode] = useState(() => localStorage.getItem("lire.focus") === "1");

  // Persist
  useEffect(() => { localStorage.setItem("lire.nav", nav); }, [nav]);
  useEffect(() => { localStorage.setItem("lire.view", viewKey); }, [viewKey]);
  useEffect(() => { localStorage.setItem("lire.selected", selectedId); }, [selectedId]);
  useEffect(() => { localStorage.setItem("lire.sidebarCollapsed", sidebarCollapsed ? "1" : "0"); }, [sidebarCollapsed]);
  useEffect(() => { localStorage.setItem("lire.viewsCollapsed", viewsCollapsed ? "1" : "0"); }, [viewsCollapsed]);
  useEffect(() => { localStorage.setItem("lire.focus", focusMode ? "1" : "0"); }, [focusMode]);

  const toggleFocus = useCallback(() => {
    setFocusMode(f => {
      const next = !f;
      // Focus mode: collapse both panels together. Exiting focus restores them both.
      setSidebarCollapsed(next);
      setViewsCollapsed(next);
      return next;
    });
  }, []);

  // Theme application
  useEffect(() => {
    const html = document.documentElement;
    if (tweaks.theme === "dark") html.classList.add("dark");
    else html.classList.remove("dark");
    html.style.setProperty("--accent", tweaks.accent);
    html.style.setProperty("--accent-hover",
      tweaks.accent === "#FF4D00" ? "#E54400"
      : tweaks.accent === "#111111" ? "#000"
      : tweaks.accent === "#0B6B4A" ? "#085539"
      : "#2647D4");
    html.style.setProperty("--accent-press",
      tweaks.accent === "#FF4D00" ? "#CC3D00"
      : tweaks.accent === "#111111" ? "#000"
      : tweaks.accent === "#0B6B4A" ? "#064128"
      : "#1D34A8");
  }, [tweaks.theme, tweaks.accent]);

  // Mutable tickets + timelines (so compose + triage actually update UI)
  const [tickets, setTickets] = useState(LIRE_DATA.tickets);
  const [timelineMap, setTimelineMap] = useState(LIRE_DATA.timelines);

  const handleTriage = useCallback((field, value) => {
    setTickets(prev => prev.map(t => t.id === selectedId ? { ...t, [field]: value, assigneeKind: field === "assignee" ? (value === "AI Concierge" ? "ai" : value ? "human" : null) : t.assigneeKind } : t));
  }, [selectedId]);

  const handleSend = useCallback((mode, body, channel) => {
    const id = `m-${Date.now()}`;
    const whoName = (user && user.name) ? user.name : "You";
    const newMsg = mode === "note"
      ? { id, kind: "internal", who: `${whoName} (note)`, at: "Just now", body }
      : { id, kind: "teammate", who: `${whoName} · You`, at: "Just now", channel, body };
    setTimelineMap(prev => ({ ...prev, [selectedId]: [...(prev[selectedId] || []), newMsg] }));
    setTickets(prev => prev.map(t => t.id === selectedId ? { ...t, lastActivity: "just now", messageCount: t.messageCount + 1 } : t));
  }, [selectedId, user]);

  // Command palette
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setCmdOpen(true); }
      if (e.key === "Escape") setCmdOpen(false);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  // Edit mode protocol
  useEffect(() => {
    const listener = (e) => {
      if (!e || !e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", listener);
    window.parent && window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setTweaksAvailable(true);
    return () => window.removeEventListener("message", listener);
  }, []);

  const onTweakChange = (next) => {
    setTweaks(next);
    window.parent && window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
  };

  // Counts for sidebar
  const counts = useMemo(() => ({
    inbox: tickets.length,
    compliance: LIRE_DATA.compliance.filter(c => c.status !== "scheduled").length,
  }), [tickets]);

  // Screen + crumbs
  let content, crumbs;
  if (nav === "dashboard") {
    crumbs = ["Portfolio", "Dashboard"];
    content = (
      <DashboardScreen
        onNav={setNav}
        onOpenTicket={(id) => { setSelectedId(id); setViewKey("priority"); }}
      />
    );
  } else if (nav === "inbox") {
    const viewLabel = LIRE_DATA.views.find(v => v.key === viewKey)?.label || "Inbox";
    crumbs = ["Operations", "Inbox", viewLabel];
    content = (
      <InboxScreen
        viewKey={viewKey} onViewChange={setViewKey}
        tickets={tickets} properties={LIRE_DATA.properties}
        selectedId={selectedId} onSelect={setSelectedId}
        timelineMap={timelineMap} onSend={handleSend} onTriage={handleTriage}
        aiPanelVisible={tweaks.aiPanel} density={tweaks.density}
        viewsCollapsed={viewsCollapsed}
        onToggleViewsCollapsed={() => setViewsCollapsed(v => !v)}
        user={user}
      />
    );
  } else if (nav === "properties") {
    crumbs = ["Portfolio", "Properties"];
    content = <PropertiesScreen onNav={setNav}/>;
  } else if (nav === "channels") {
    crumbs = ["Communications", "Channels"];
    content = <ChannelsScreen onOpenInbox={(chKey) => {
      const mapped = { email: "ch-email", whatsapp: "ch-whatsapp", sms: "ch-sms", zoom: "ch-zoom" }[chKey] || "priority";
      setViewKey(mapped);
      setNav("inbox");
    }}/>;
  } else if (nav === "concierge") {
    crumbs = ["Agents", "LIRE Concierge"];
    content = <ConciergeScreen heroVariant={tweaks.conciergeHero || "A"} onNavLibrary={() => setNav("library")}/>;
  } else if (nav === "compliance") {
    crumbs = ["Portfolio Intelligence", "Compliance"];
    content = <ComplianceScreen/>;
  } else if (nav === "library") {
    crumbs = ["Portfolio", "Library"];
    content = <LibraryScreen onNavConcierge={() => setNav("concierge")}/>;
  } else {
    crumbs = ["—", nav];
    content = (
      <div style={{ padding: 40, color: "var(--fg-muted)" }}>
        <Eyebrow>Stub</Eyebrow>
        <h2 style={{ margin: "6px 0 0", fontFamily: "var(--font-display)", fontWeight: 600, color: "var(--fg)" }}>
          {nav.charAt(0).toUpperCase() + nav.slice(1)}
        </h2>
        <p style={{ marginTop: 4, fontSize: 13 }}>Placeholder in this demo — Inbox, Dashboard, Properties, and Compliance are the wired flows.</p>
      </div>
    );
  }

  // Landing + login short-circuit the app shell entirely
  if (view === "landing") {
    return (
      <div className={`density-${tweaks.density}`} style={{ height: "100vh", width: "100vw", background: "var(--bg)", color: "var(--fg)", overflowY: "auto", overflowX: "hidden" }} data-screen-label="Landing">
        <LandingScreen
          heroVariant={tweaks.landingHero || "A"}
          onLogin={() => setView("login")}
          onApp={() => {
            // Walk-the-demo from landing: use a demo account so we don't show "Guest" in the app chrome.
            if (!user.authed) setUser(makeUser("demo@lire.app"));
            setView("app");
          }}
        />
        <TweaksPanel open={tweaksOpen} tweaks={tweaks} onChange={onTweakChange} onClose={() => setTweaksOpen(false)}/>
      </div>
    );
  }
  if (view === "login") {
    return (
      <div className={`density-${tweaks.density}`} style={{ height: "100vh", background: "var(--bg)", color: "var(--fg)", overflow: "hidden" }} data-screen-label="Login">
        <LoginScreen
          onApp={signIn}
          onLanding={() => setView("landing")}
        />
        <TweaksPanel open={tweaksOpen} tweaks={tweaks} onChange={onTweakChange} onClose={() => setTweaksOpen(false)}/>
      </div>
    );
  }

  return (
    <div className={`density-${tweaks.density}`} style={{
      display: "flex", height: "100vh", background: "var(--bg)", color: "var(--fg)",
      overflow: "hidden",
    }} data-screen-label={nav.charAt(0).toUpperCase() + nav.slice(1)}>
      <Sidebar active={nav} onNav={setNav} counts={counts}
        user={user}
        collapsed={sidebarCollapsed} onToggleCollapsed={() => setSidebarCollapsed(v => !v)}/>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <Topbar crumbs={crumbs}
          theme={tweaks.theme}
          onThemeToggle={() => onTweakChange({ ...tweaks, theme: tweaks.theme === "dark" ? "light" : "dark" })}
          onOpenCmd={() => setCmdOpen(true)}
          focusMode={focusMode}
          onToggleFocus={toggleFocus}
          action={nav === "inbox"
            ? <Btn variant="primary" icon={<Icon.Plus size={13}/>} size="md" onClick={() => setNewTicketOpen(true)}>New ticket</Btn>
            : nav === "dashboard" ? null : null}
        />
        <div style={{ flex: 1, minHeight: 0, display: "flex" }}>
          {content}
        </div>
      </div>

      <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)}
        onNavigate={(k) => setNav(k)}
        onOpenTicket={(id) => { setSelectedId(id); setNav("inbox"); }}
        onNewTicket={() => setNewTicketOpen(true)}
        tickets={tickets} properties={LIRE_DATA.properties}/>

      <NewTicketModal
        open={newTicketOpen}
        onClose={() => setNewTicketOpen(false)}
        properties={LIRE_DATA.properties}
        user={user}
        onCreate={(ticket, firstMsg) => {
          setTickets(prev => [ticket, ...prev]);
          setTimelineMap(prev => ({ ...prev, [ticket.id]: [firstMsg] }));
          setSelectedId(ticket.id);
          setViewKey("priority");
          setNav("inbox");
          setNewTicketOpen(false);
        }}
      />

      <TweaksPanel open={tweaksOpen} tweaks={tweaks} onChange={onTweakChange} onClose={() => setTweaksOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0A0A0A"/>
  <rect x="60" y="60" width="80" height="80" fill="none" stroke="#FF4D00" stroke-width="8"/>
  <text x="100" y="115" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="44" fill="#FAFAFA" letter-spacing="-0.04em">L</text>
</svg>
</template>
</body>
</html>
